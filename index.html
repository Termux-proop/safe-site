
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Gamer | jaykeywall</title>
    <style>
        body {
            background: #0a0a0a;
            color: #ffffff;
            font-family: 'Courier New', monospace;
            text-align: center;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 90vh;
        }
        .container {
            border: 1px solid #00ff00;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            max-width: 400px;
            margin: 0 auto;
        }
        h1 { color: #00ff00; font-size: 1.8em; letter-spacing: 2px; }
        .btn {
            display: block;
            background: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 15px;
            margin: 20px 0;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            cursor: pointer;
        }
        .btn:hover {
            background: #00ff00;
            color: #000;
        }
        .status-box {
            font-size: 0.8em;
            color: #888;
            margin-top: 10px;

</head>
<body>

    <div class="container">
        <h1>SAFE GAMER</h1>
        <p>Авторский надзор и кибербезопасность в играх.</p>
        
        <div id="status" class="status-box">Система готова к проверке</div>

        <div class="btn" onclick="runScan()">ПРОВЕРИТЬ УЯЗВИМОСТЬ</div>
        
        <a href="https://t.me/jaykeywall" class="btn" style="border-color: #fff; color: #fff;">КУПИТЬ ГАЙД ПО ЗАЩИТЕ</a>
    </div>

    <script>
        function runScan() {
            const status = document.getElementById('status');
            status.innerText = "Идет анализ сетевых пакетов...";
            status.style.color = "#ffff00";

            setTimeout(() => {
                status.innerText = "ПРОВЕРКА ЗАВЕРШЕНА";
                status.style.color = "#ff0000";
                alert("ВНИМАНИЕ!\nВаш цифровой след обнаружен в базе потенциальных целей.\n\nОбнаружено уязвимостей: 3\nРиск взлома: ВЫСОКИЙ\n\nРекомендуется обновить протоколы безопасности через гайд.");
            }, 2500);
        }
    </script>

</body>
